<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">

      <div class="flex-icone"><i class="bi bi-play-btn"></i>
        <ul class="menu">
          <li><a href="#" class="esplora">Esplora</a></li>
          <li><a href="#" class="seguiti">Seguiti</a></li>
          <li class="per-te"><a href="#">Per te</a></li>
        </ul>
        <i class="bi bi-search"></i>

      </div>

    </header>

    <!-- Sidebar -->
    <div class="sidebar">

      <ul>

        <li>
          <div class="logo-plus"><a class="logo" href="#"></a></div>
        </li>

        <li><i class="bi bi-heart-fill">588</i></li>

        <li><i class="bi bi-chat-dots-fill">13</i></li>

        <li></li><i class="bi bi-bookmark-fill">638</i></li>

        <li></li><i class="bi bi-sign-turn-slight-right-fill">491</i></li>

      </ul>

    </div>

    <!-- Footer -->
    <footer>

      <ul>

        <li>
          <div class="footer menu"><i class="bi bi-house-fill">Home</i></div>
        </li>

        <li><i class="bi bi-people">Amici</i></li>

        <li><i class="bi bi-chat-square">Posta in Arrivo</i></li>


        <li><i class="bi bi-person">Profilo</i></li>







      </ul>

    </footer>
  </div>

</body>

</html>
