<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->

    <header class="reel-header">

      <ul class="header-menu">
        <li>
          <a href="#" class="icona-reel">
            <i class="bi bi-play-btn"></i>
          </a>
        </li>
        <li>
          <a href="#" class="esplora">
            <span>Esplora</span>
          </a>
        </li>
        <li>
          <a href="#" class="seguiti">
            <span class="red-dot">Seguiti</span>
          </a>
        </li>
        <li class="per-te">
          <a href="#">
            Per te
          </a>
        </li>
        <li>
          <a href="#" class="icona-cerca">
            <i class="bi bi-search"></i>
          </a>
        </li>
      </ul>

  </div>

  </header>

  <!-- Sidebar -->
  <div class="sidebar">

    <ul class="sidebar-menu">

      <li>
        <div class="logo-plus">
          <a class="logo" href="#"></a>
        </div>
      </li>

      <li>
        <i class="bi bi-heart-fill"></i>
        <span>588</span>
      </li>

      <li>
        <i class="bi bi-chat-dots-fill"></i>
        <span>13</span>

      </li>

      <li>
        <i class="bi bi-bookmark-fill"></i>
        <span>638</span>
      </li>

      <li>
        <i class="bi bi-sign-turn-slight-right-fill"></i>
        <span>491</span>
      </li>

    </ul>

    <div class="text-box">

      <a href="#">Andrea Mascio DEV</a><br>

      <p>Prova il FundamentalsCamp, 20 ore di corso gratuito per...
        <span class="grassetto">Vedi altro</span>
      </p>

    </div>




  </div>

  <!-- Footer -->
  <footer>

    <ul class="footer-menu">

      <li>
        <button>
          <i class="bi bi-house-fill"></i>
        </button>
        <span>Home</span>
      </li>

      <li>
        <button>
          <i class="bi bi-people"></i>
        </button>
        <span>Amici</span>
      </li>

      <li>
        <a href="#" class="add-video">
          <i class="bi bi-plus-square-fill"></i>
        </a>
      </li>

      <li>
        <button class="posta">
          <i class="bi bi-chat-square"></i>
        </button>
        <span>Posta in Arrivo</span>
      </li>


      <li>
        <button>
          <i class="bi bi-person"></i>
        </button>
        <span>Profilo</span>
      </li>







    </ul>

  </footer>
  </div>

</body>

</html>
